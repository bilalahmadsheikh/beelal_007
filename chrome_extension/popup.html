<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BilalAgent v3.0</title>
  <link rel="stylesheet" href="popup.css">
</head>

<body>

  <!-- ─── Header ──────────────────────────────────── -->
  <div class="header">
    <div class="header-icon">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
        <path d="M12 2L2 7l10 5 10-5-10-5z" />
        <path d="M2 17l10 5 10-5" />
        <path d="M2 12l10 5 10-5" />
      </svg>
    </div>
    <div class="header-info">
      <h1>BilalAgent</h1>
      <div class="subtitle">v3.0 — Desktop AI Agent</div>
    </div>
    <div class="status-dot offline" id="status-dot" title="Bridge: checking..."></div>
  </div>

  <!-- ─── Tab Bar ─────────────────────────────────── -->
  <div class="tab-bar">
    <button class="active" data-tab="feed">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" />
      </svg>
      Activity
      <span class="tab-badge" id="feed-badge" style="display:none">0</span>
    </button>
    <button data-tab="status">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M22 12h-4l-3 9L9 3l-3 9H2" />
      </svg>
      Status
    </button>
  </div>

  <!-- ─── Tab: Activity Feed ──────────────────────── -->
  <div class="tab-panel active" id="panel-feed">
    <div class="feed-scroll" id="feed">
      <div class="feed-empty" id="feed-empty">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M12 2L2 7l10 5 10-5-10-5z" />
          <path d="M2 17l10 5 10-5" />
          <path d="M2 12l10 5 10-5" />
        </svg>
        <div>
          <div style="font-weight:600; color: var(--text-secondary);">No activity yet</div>
          <div style="font-size:11px; margin-top:4px;" class="waiting-pulse">
            Waiting for desktop agent...
          </div>
        </div>
      </div>
    </div>

    <!-- ─── Prompt Input ──────────────────────────── -->
    <div class="prompt-bar">
      <input type="text" class="prompt-input" id="prompt-input" placeholder="Send a prompt to agent..."
        autocomplete="off">
      <button class="prompt-send" id="prompt-send" title="Send">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="22" y1="2" x2="11" y2="13" />
          <polygon points="22 2 15 22 11 13 2 9 22 2" />
        </svg>
      </button>
    </div>
  </div>

  <!-- ─── Tab: Status ─────────────────────────────── -->
  <div class="tab-panel" id="panel-status">
    <div class="status-panel">
      <div class="status-row">
        <span class="status-label">Bridge</span>
        <span id="bridge-status" class="badge badge-red">Checking...</span>
      </div>
      <div class="status-row">
        <span class="status-label">Agent</span>
        <span id="agent-status" class="badge badge-amber">Unknown</span>
      </div>
      <div class="status-row">
        <span class="status-label">Mode</span>
        <span class="status-value" id="mode">Local</span>
      </div>
      <div class="status-row">
        <span class="status-label">Cookies Synced</span>
        <span class="status-value" id="cookie-sites">—</span>
      </div>

      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-num" id="pending-count">0</div>
          <div class="stat-label">Pending</div>
        </div>
        <div class="stat-card">
          <div class="stat-num" id="content-count">0</div>
          <div class="stat-label">Content</div>
        </div>
        <div class="stat-card">
          <div class="stat-num" id="total-count">0</div>
          <div class="stat-label">Total</div>
        </div>
      </div>

      <div class="status-row" style="margin-top:4px">
        <span class="status-label">SSE Stream</span>
        <span id="sse-status" class="badge badge-red">Disconnected</span>
      </div>
    </div>
  </div>

  <!-- ─── Footer ──────────────────────────────────── -->
  <a class="footer-link" href="http://localhost:8000/docs" target="_blank">
    Open API Dashboard ↗
  </a>

  <script src="popup.js"></script>
</body>

</html>
